services:
  postgres:
    image: postgres:16-alpine
    container_name: emitly-postgres
    environment:
      POSTGRES_USER: emitly
      POSTGRES_PASSWORD: emitly
      POSTGRES_DB: emitly
    ports:
      - "5433:5432"
    volumes:
      - emitly_pgdata:/var/lib/postgresql/data
      - ./db/001_dream_list_schema.sql:/docker-entrypoint-initdb.d/001_dream_list_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emitly -d emitly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  emitly_pgdata:
